[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: fast unit tests
    integration: tests requiring file system and binaries
    eval: evaluation/benchmark tests
    fuse: tests requiring FUSE mount capability
    slow: tests that take > 5 seconds
    api: API-level tests requiring a running backend server (port 8000)
    cluster: multi-node Docker cluster tests (requires docker compose)
asyncio_mode = auto
addopts = -v --tb=short
